<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="theme-color" content="#0b1020" />
    <title>الصفحة غير موجودة | بورتفوليو عبدالعزيز</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <style>
      :root { color: #edf0f8; background: #0b1020; font-family: Tahoma, "Segoe UI", Arial, sans-serif; }
      * { box-sizing: border-box; }
      body { display: grid; min-height: 100vh; margin: 0; place-items: center; padding: 1.5rem; }
      main { width: min(100%, 42rem); padding: clamp(2rem, 8vw, 5rem); overflow: hidden; text-align: center; background: linear-gradient(135deg, #151e35, #111729); border: 1px solid rgba(215,225,255,.16); border-radius: 1.5rem; box-shadow: 0 30px 90px rgba(0,0,0,.35); }
      .code { margin: 0; color: #e6ff5b; font-family: ui-monospace, Consolas, monospace; font-size: clamp(4rem, 16vw, 8rem); font-weight: 800; line-height: 1; letter-spacing: -.12em; }
      h1 { margin: 1.4rem 0 .8rem; font-size: clamp(1.7rem, 5vw, 2.5rem); line-height: 1.25; letter-spacing: -.04em; }
      p { max-width: 29rem; margin: 0 auto 2rem; color: #aeb8cc; line-height: 1.9; }
      a { display: inline-block; padding: .8rem 1.2rem; color: #202800; background: #e6ff5b; border-radius: 999px; font-weight: 800; text-decoration: none; }
      a:focus-visible { outline: 3px solid white; outline-offset: 4px; }
    </style>
  </head>
  <body>
    <main>
      <p class="code" aria-label="خطأ 404">404</p>
      <h1>يبدو أن هذه الصفحة أخذت مسارًا آخر.</h1>
      <p>الرابط الذي فتحته غير موجود أو تم نقله. يمكنك العودة إلى الصفحة الرئيسية من هنا.</p>
      <a href="./">العودة للرئيسية</a>
    </main>
  </body>
</html>
